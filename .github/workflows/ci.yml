name: CI

on:
  push:
    branches: [main]
  pull_request:

# Avoid running CI twice for the same commit (once for the branch push and
# once for the PR), and cancel superseded runs when a PR branch is updated.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Ruff (lint)
        run: |
          ruff check .

      - name: Ruff (format check)
        run: |
          ruff format . --check

  unit-tests:
    name: Unit tests (fast)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests (exclude integration)
        run: |
          pytest -q -m "not integration"
      - name: Validate recipes
        run: |
          python scripts/validate_recipes.py

  integration-tests:
    name: Golden path integration (DoD-1..DoD-4)
    runs-on: ubuntu-latest
    needs: [lint, unit-tests]
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]
    env:
      # Contract: force offline mode so no test depends on network access.
      HPC_ODA_OFFLINE: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install (editable)
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: DoD-1 sanity (CLI help)
        run: |
          hpc-oda --help

      - name: Run integration tests
        run: |
          pytest -q -m integration
