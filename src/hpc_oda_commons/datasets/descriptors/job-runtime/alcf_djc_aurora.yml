dataset_id: dataset.job_runtime.alcf_djc_aurora
schema_version: oda.dataset.v0.1.0
name: ALCF DJC — Aurora (2025–2026)
version: 1.0.0
description: >
  DIM_JOB_COMPOSITE job accounting from Argonne's Aurora supercomputer, all published years
  (2025-01 through 2026-06, two files), from the ALCF public DATA CATALOG. Same schema as the
  Polaris DJC dataset: PBS scheduler data with real requested walltime (WALLTIME_SECONDS) and
  elapsed runtime (RUNTIME_SECONDS), plus cores/nodes used+requested, queue, exit status, machine,
  award category, and science field; user/project pre-anonymized. Primary-quality. ALCF gates
  downloads behind a one-time name/email form, so this is a `manual`-kind dataset: fetch the files
  yourself, then `datasets prepare --from <dir>` checksum-verifies and normalizes them. See
  docs/datasets/alcf-djc-ingest.md.
problem_domains: [job-runtime-prediction]
systems: [Aurora]
providers: [ALCF, Argonne]
citation: { url: "https://reports.alcf.anl.gov/data/index.html" }
license:
  spdx: LicenseRef-alcf-public
  gated: true
  notes: "ALCF Public Data; download requires a one-time name/email form. License unstated; cite ALCF."
tags: [alcf, argonne, aurora, pbs, cobalt]
size:
  default_bytes: 79571194
  full_bytes: 79571194
  rows_hint: "891,952 jobs (Aurora, 2025-2026)"

source:
  kind: manual
  instructions: >
    ALCF DJC is public data behind a one-time name/email form. In a browser open
    https://reports.alcf.anl.gov/data/aurora.html, click a DIM_JOB_COMPOSITE download link,
    complete the short form (first/last name + email) once, then download both Aurora
    ANL-ALCF-DJC-AURORA_*.csv.gz files into one directory. Run
    `hpc-oda datasets prepare dataset.job_runtime.alcf_djc_aurora --from <dir>` pointing at that
    directory (each file's sha256 is checksum-verified before normalization). See
    docs/datasets/alcf-djc-ingest.md for the full recipe.
  resources:
    - filename: ANL-ALCF-DJC-AURORA_20250127_20251231.csv.gz
      sha256: 33e829a855567924569fa06a92cfa64215922f1fffd1b7a1dd57f17b2ddd6491
      bytes: 61534432
    - filename: ANL-ALCF-DJC-AURORA_20260101_20260616.csv.gz
      sha256: b0fd41d9c65de7c1d9e05f0856bdc6fce2c6e2b3ad2415b279e735277bf3a1fc
      bytes: 18036762

decode:
  format: csv
  options:
    # Read only the mapped columns (the raw file has 67 columns incl. a heavy node-list field).
    columns:
      [
        JOB_NAME,
        QUEUED_TIMESTAMP,
        START_TIMESTAMP,
        END_TIMESTAMP,
        RUNTIME_SECONDS,
        WALLTIME_SECONDS,
        CORES_USED,
        CORES_REQUESTED,
        NODES_USED,
        NODES_REQUESTED,
        QUEUE_NAME,
        EXIT_STATUS,
        USERNAME_GENID,
        PROJECT_NAME_GENID,
        MACHINE_NAME,
        ALLOCATION_AWARD_CATEGORY,
        SCIENCE_FIELD_SHORT,
      ]

targets:
  - schema: oda.job.v0.2.0
    capabilities:
      - { problem_domain: job-runtime-prediction, target_column: runtime_seconds }
    suitable_models: [model.job_runtime_baseline, model.job_runtime_xgboost]
    mapping:
      job_id: { from: JOB_NAME }
      submit_time: { from: QUEUED_TIMESTAMP, type: timestamp, format: iso8601 }
      start_time: { from: START_TIMESTAMP, type: timestamp, format: iso8601 }
      end_time: { from: END_TIMESTAMP, type: timestamp, format: iso8601 }
      runtime_seconds: { from: RUNTIME_SECONDS, type: duration, unit: seconds }
      requested_seconds: { from: WALLTIME_SECONDS, type: duration, unit: seconds }
      allocated_cpus: { from: CORES_USED, type: integer }
      num_cores_req: { from: CORES_REQUESTED, type: integer }
      num_nodes_alloc: { from: NODES_USED, type: integer }
      num_nodes_req: { from: NODES_REQUESTED, type: integer }
      queue: { from: QUEUE_NAME }
      job_state: { from: EXIT_STATUS }
      user: { from: USERNAME_GENID }
      account: { from: PROJECT_NAME_GENID }
      machine: { from: MACHINE_NAME }
      award_category: { from: ALLOCATION_AWARD_CATEGORY }
      science_field: { from: SCIENCE_FIELD_SHORT }
    filter:
      require_nonnull: [runtime_seconds, start_time, end_time]
      require_positive: [allocated_cpus]
      require_end_after_start: true
    output: { id: alcf_djc_aurora, path: data/datasets/alcf_djc_aurora/data.parquet }
