dataset_id: dataset.job_runtime.atlas_mustang
schema_version: oda.dataset.v0.1.0
name: Atlas Mustang (LANL)
version: 1.0.0
description: >
  LANL Mustang cluster SLURM trace from the Atlas repository (2.1M jobs, 2011-2016).
  The runtime-prediction target is derived (end_time - start_time); requested walltime
  = wallclock_limit (a pandas timedelta string). Mustang has no job identifier column,
  so job_id is a synthesized row-index surrogate. Timestamps carry -06:00/-07:00 offsets
  and are normalized to UTC. Citation required (USENIX ATC'18).
problem_domains: [job-runtime-prediction]
systems: [Mustang]
providers: [LANL]
citation: { url: "https://ftp.pdl.cmu.edu/pub/datasets/ATLAS/" }
license: { spdx: CC-BY-4.0, gated: false }
tags: [atlas, lanl, mustang, slurm]
size:
  default_bytes: 17542790
  full_bytes: 17542790
  rows_hint: "~2.1M jobs (2011-2016)"

source:
  kind: http
  resources:
    - filename: mustang_release_v1.0beta.csv.gz
      url: "https://ftp.pdl.cmu.edu/pub/datasets/ATLAS/mustang/mustang_release_v1.0beta.csv.gz"
      sha256: b1aed0adb731e92d72c20ff94317ca39188f6a8fb84c8fad1862ae181881eba8
      bytes: 17542790

decode:
  format: csv

targets:
  - schema: oda.job.v0.2.0
    capabilities:
      - { problem_domain: job-runtime-prediction, target_column: runtime_seconds }
    suitable_models: [model.job_runtime_baseline, model.job_runtime_xgboost]
    mapping:
      job_id: { synthesize: row_index }
      submit_time: { from: submit_time, type: timestamp, format: iso8601 }
      start_time: { from: start_time, type: timestamp, format: iso8601 }
      end_time: { from: end_time, type: timestamp, format: iso8601 }
      runtime_seconds: { derive: "end_time - start_time" }
      requested_seconds: { from: wallclock_limit, type: duration, unit: timedelta }
      num_nodes_req: { from: node_count, type: integer }
      num_tasks_req: { from: tasks_requested, type: integer }
      job_state: { from: job_status }
      user: { from: user_ID, type: hash_identifier }
      account: { from: group_ID, type: hash_identifier }
    filter: { require_nonnull: [runtime_seconds] }
    output: { id: atlas_mustang, path: data/datasets/atlas_mustang/data.parquet }
