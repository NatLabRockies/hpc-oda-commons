dataset_id: dataset.job_runtime.atlas_opentrinity
schema_version: oda.dataset.v0.1.0
name: Atlas OpenTrinity (LANL)
version: 1.0.0
description: >
  LANL Trinity (OpenTrinity) SLURM trace from the Atlas repository, formatted release
  (~25k jobs, 2017). The runtime-prediction target is derived (end_time - start_time);
  requested walltime = wallclock_limit (a pandas timedelta string). No job identifier
  column, so job_id is a synthesized row-index surrogate. Timestamps carry -06:00/-07:00
  offsets and are normalized to UTC. Citation required (USENIX ATC'18).
problem_domains: [job-runtime-prediction]
systems: [Trinity]
providers: [LANL]
citation: { url: "https://ftp.pdl.cmu.edu/pub/datasets/ATLAS/" }
license: { spdx: CC-BY-4.0, gated: false }
tags: [atlas, lanl, trinity, slurm]
size:
  default_bytes: 284486
  full_bytes: 284486
  rows_hint: "~25k jobs (2017)"

source:
  kind: http
  resources:
    - filename: trinity_formatted_release_v1.0beta.csv.gz
      url: "https://ftp.pdl.cmu.edu/pub/datasets/ATLAS/trinity/trinity_formatted_release_v1.0beta.csv.gz"
      sha256: df64a52bf6210b7db9205895f7fd59ff428893446be784230a17cb31f28fb105
      bytes: 284486

decode:
  format: csv

targets:
  - schema: oda.job.v0.2.0
    capabilities:
      - { problem_domain: job-runtime-prediction, target_column: runtime_seconds }
    suitable_models: [model.job_runtime_baseline, model.job_runtime_xgboost]
    mapping:
      job_id: { synthesize: row_index }
      submit_time: { from: submit_time, type: timestamp, format: iso8601 }
      start_time: { from: start_time, type: timestamp, format: iso8601 }
      end_time: { from: end_time, type: timestamp, format: iso8601 }
      runtime_seconds: { derive: "end_time - start_time" }
      requested_seconds: { from: wallclock_limit, type: duration, unit: timedelta }
      num_nodes_req: { from: node_count, type: integer }
      num_tasks_req: { from: tasks_requested, type: integer }
      job_state: { from: job_status }
      user: { from: user_ID, type: hash_identifier }
      account: { from: group_ID, type: hash_identifier }
    filter: { require_nonnull: [runtime_seconds] }
    output: { id: atlas_opentrinity, path: data/datasets/atlas_opentrinity/data.parquet }
