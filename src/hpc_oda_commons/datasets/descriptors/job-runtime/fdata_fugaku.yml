dataset_id: dataset.job_runtime.fdata_fugaku
schema_version: oda.dataset.v0.1.0
name: F-DATA (Fugaku Jobs, Jul–Sep 2023)
version: 1.1.0
description: >
  Fujitsu/Fugaku job records from F-DATA (RIKEN R-CCS / University of Bologna).
  This descriptor curates a gap-free three-month slice (2023-07 through 2023-09) as the
  premium runtime slice — an outage-free 90-day window for the rolling benchmark. Fugaku
  takes periodic ~3-day maintenance outages, so this quarter was chosen by scanning for an
  outage-free period (the recent Jan–Apr 2024 had two 3-day full outages and no clean 90-day
  window). The full dataset spans Mar 2021 - Apr 2024 (38 monthly parquet files, ~24M jobs,
  ~28 GB). Runtime-prediction target = duration (seconds).
  Rich per-job power/perf counters (econ, avg/min/max pcon, flops, mbwidth) are
  available for a later power phase.
problem_domains: [job-runtime-prediction, job-power-prediction]
systems: [Fugaku]
providers: ["RIKEN R-CCS", "University of Bologna"]
citation: { doi: "10.5281/zenodo.11467483", url: "https://zenodo.org/records/11467483" }
license: { spdx: CC-BY-4.0, gated: false }
tags: [fugaku, a64fx, fujitsu, arm, power]
size:
  default_bytes: 2601266499
  full_bytes: 28000000000
  rows_hint: "Jul-Sep 2023 (3 clean months); ~24M full"

source:
  kind: zenodo
  record: "11467483"
  resources:
    - filename: "23_07.parquet"
      url: "https://zenodo.org/records/11467483/files/23_07.parquet"
      sha256: eaed73c23bae77d51901bd946d7c7f1c80b17403305dab72f8e9435acb87a31f
      bytes: 968169044
    - filename: "23_08.parquet"
      url: "https://zenodo.org/records/11467483/files/23_08.parquet"
      sha256: 08c3d68d165e5e5f635a9b077acaf416d066006f7fee618c9dd2df46af32648d
      bytes: 1177409305
    - filename: "23_09.parquet"
      url: "https://zenodo.org/records/11467483/files/23_09.parquet"
      sha256: a5fb88d30448ccec00224c43abab62723e1f2bc31db93fc3985650fcc9dbf5b9
      bytes: 455688150

decode:
  format: parquet

targets:
  - schema: oda.job.v0.2.0
    capabilities:
      - { problem_domain: job-runtime-prediction, target_column: runtime_seconds }
    suitable_models: [model.job_runtime_baseline, model.job_runtime_xgboost]
    mapping:
      job_id: { from: jid }
      start_time: { from: sdt, type: timestamp, format: iso8601 }
      end_time: { from: edt, type: timestamp, format: iso8601 }
      submit_time: { from: adt, type: timestamp, format: iso8601 }
      runtime_seconds: { from: duration, type: duration, unit: seconds }
      requested_seconds: { from: elpl, type: duration, unit: seconds }
      user: { from: usr, type: hash_identifier }
      name: { from: jnam }
      num_cores_req: { from: cnumr, type: integer }
      num_nodes_req: { from: nnumr, type: integer }
      num_cores_alloc: { from: cnumat, type: integer }
      num_nodes_alloc: { from: nnuma, type: integer }
      exit_code: { from: ec, type: integer }
      job_state: { from: "exit state" }
      pclass: { from: pclass }
    filter: { require_nonnull: [runtime_seconds] }
    output: { id: fdata_fugaku, path: data/datasets/fdata_fugaku/data.parquet }
