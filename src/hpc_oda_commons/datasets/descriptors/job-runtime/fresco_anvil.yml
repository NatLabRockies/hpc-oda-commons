decode:
  format: csv

targets:
  - schema: oda.job.v0.2.0
    capabilities:
      - { problem_domain: job-runtime-prediction, target_column: runtime_seconds }
    suitable_models: [model.job_runtime_baseline, model.job_runtime_xgboost]
    mapping:
      job_id: { from: "Job Id" }
      submit_time: { from: "Submit Time", type: timestamp, format: iso8601 }
      start_time: { from: "Start Time", type: timestamp, format: iso8601 }
      end_time: { from: "End Time", type: timestamp, format: iso8601 }
      runtime_seconds: { from: "Wall Time", type: duration, unit: seconds }
      requested_seconds: { from: "Requested Wall Time", type: duration, unit: seconds }
      allocated_cpus: { from: "Cores", type: integer }
      num_nodes_alloc: { from: "Nodes", type: integer }
      num_gpus_req: { from: "Gpus", type: integer }
      num_nodes_req: { from: "Requested Nodes", type: integer }
      queue: { from: "Queue" }
      job_state: { from: "Exit Status" }
      user: { from: "User" }
      account: { from: "Account" }
    filter: { require_nonnull: [runtime_seconds] }
    output: { id: fresco_anvil, path: data/datasets/fresco_anvil/data.parquet }
