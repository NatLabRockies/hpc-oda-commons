dataset_id: dataset.job_runtime.fresco_anvil
schema_version: oda.dataset.v0.1.0
name: FRESCO Anvil Job Accounting
version: 1.0.0
description: >
  Anonymized SLURM job accounting from Purdue's Anvil supercomputer (A100), from the FRESCO
  repository, 11 monthly CSVs covering July 2022 - May 2023. Runtime target = Wall Time
  (seconds); requested walltime = Requested Wall Time (seconds). Timestamps are ISO with a
  trailing "UTC" zone word. Cores/GPUs/nodes, requested nodes, queue, exit status, wait time
  as features; user/account already anonymized. Fetched from the datadepot over direct HTTPS
  (no Globus). Primary-quality Slurm accounting.
problem_domains: [job-runtime-prediction]
systems: [Anvil]
providers: [Purdue, TACC]
citation: { url: "https://www.datadepot.rcac.purdue.edu/sbagchi/fresco/" }
license:
  spdx: LicenseRef-fresco
  gated: false
  notes: "FRESCO research data; citation required (Bagchi et al., Purdue/TACC)."
tags: [fresco, anvil, purdue, slurm, a100]
size:
  default_bytes: 289633623
  full_bytes: 289633623
  rows_hint: "~1.5M jobs across 11 months (2022-07 to 2023-05)"

source:
  kind: http
  resources:
    - { filename: job_accounting_july2022_anon.csv, url: "https://www.datadepot.rcac.purdue.edu/sbagchi/fresco/repository/Anvil/JobAccounting/job_accounting_july2022_anon.csv", sha256: 9fb35e7eb76dc9aa2bf5b5c52a13971b9dc392b87556dbcfbfb3fae7e53abe12, bytes: 9158807 }
