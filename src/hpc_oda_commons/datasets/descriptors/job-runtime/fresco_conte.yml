decode:
  format: csv
  options:
    # Read only the mapped columns (skips unmapped columns whose inferred type varies by month).
    columns:
      [
        jobID,
        qtime,
        start,
        end,
        "resources_used.walltime",
        "Resource_List.walltime",
        "Resource_List.ncpus",
        "Resource_List.nodect",
        queue,
        Exit_status,
        user,
        group,
      ]

targets:
  - schema: oda.job.v0.2.0
    capabilities:
      - { problem_domain: job-runtime-prediction, target_column: runtime_seconds }
    suitable_models: [model.job_runtime_baseline, model.job_runtime_xgboost]
    mapping:
      job_id: { from: jobID }
      submit_time: { from: qtime, type: timestamp, format: "%m/%d/%Y %H:%M:%S" }
      start_time: { from: start, type: timestamp, format: "%m/%d/%Y %H:%M:%S" }
      end_time: { from: end, type: timestamp, format: "%m/%d/%Y %H:%M:%S" }
      runtime_seconds: { from: "resources_used.walltime", type: duration, unit: seconds }
      requested_seconds: { from: "Resource_List.walltime", type: duration, unit: seconds }
      num_cores_alloc: { from: "Resource_List.ncpus", type: integer }
      num_nodes_alloc: { from: "Resource_List.nodect", type: integer }
      queue: { from: queue }
      job_state: { from: Exit_status }
      user: { from: user }
      account: { from: group }
    filter: { require_nonnull: [runtime_seconds] }
    output: { id: fresco_conte, path: data/datasets/fresco_conte/data.parquet }
