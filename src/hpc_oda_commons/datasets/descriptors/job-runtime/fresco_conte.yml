dataset_id: dataset.job_runtime.fresco_conte
schema_version: oda.dataset.v0.1.0
name: FRESCO Conte Job Accounting
version: 1.0.0
description: >
  Torque/PBS job accounting from Purdue's Conte cluster, from the FRESCO repository. The
  premium slice is 12 consecutive months (2015-03 to 2016-02) of the per-event accounting
  CSVs; the require_nonnull runtime filter keeps only the completed-job (E) records (Q/S
  events have no runtime). Runtime target = resources_used.walltime (seconds); requested
  walltime = Resource_List.walltime (seconds); timestamps are MM/DD/YYYY (parsed via a
  strptime pattern). user/group already anonymized. Fetched from the datadepot over direct HTTPS.
problem_domains: [job-runtime-prediction]
systems: [Conte]
providers: [Purdue]
citation: { url: "https://www.datadepot.rcac.purdue.edu/sbagchi/fresco/" }
license:
  spdx: LicenseRef-fresco
  gated: false
  notes: "FRESCO research data; citation required (Bagchi et al., Purdue/TACC)."
tags: [fresco, conte, purdue, torque, pbs]
size:
  default_bytes: 1054857342
  full_bytes: 1054857342
  rows_hint: "~1M completed jobs (E events), 2015-03 to 2016-02"

source:
  kind: http
  resources:
    - { filename: 2015-03.csv, url: "https://www.datadepot.rcac.purdue.edu/sbagchi/fresco/repository/Conte/AccountingStatistics/2015-03.csv", sha256: 6fe61af3c0f304a4f273fd4f2ff4ec20143904d0c57af9e57c5b1d7f83fe18c9, bytes: 80189771 }
