dataset_id: dataset.job_runtime.lassen
schema_version: oda.dataset.v0.1.0
name: Lassen LAST (LLNL)
version: 1.0.0
description: >
  Per-job allocation history from LLNL's Lassen supercomputer (IBM CSM/LSF), 1,467,747 jobs,
  from the Livermore Archive for System Telemetry (LAST). Runtime target is derived
  (end_time - begin_time); requested walltime = time_limit (seconds; 2147483647 is the
  "unlimited" sentinel); allocated nodes/CPUs/GPUs, queue, and exit status as features;
  user/group already hashed. Timestamps are naive (microsecond) and treated as UTC.
  The file is git-LFS-tracked in GitHub but fetched over plain HTTPS via the LFS media URL
  (media.githubusercontent.com) -- no git-lfs tooling required.
problem_domains: [job-runtime-prediction]
systems: [Lassen]
providers: [LLNL]
citation: { url: "https://github.com/LLNL/LAST" }
license: { spdx: CC-BY-4.0, gated: false }
tags: [lassen, llnl, lsf, csm, gpu]
size:
  default_bytes: 361768711
  full_bytes: 361768711
  rows_hint: "1,467,747 jobs (2018-2020)"

source:
  kind: http
  resources:
    - filename: lassen_jobs.csv
      url: "https://media.githubusercontent.com/media/LLNL/LAST/main/Lassen-Supercomputer-Job-Dataset/final_csm_allocation_history_hashed.csv"
      sha256: 8d2429f034f626ee052e50d11f77ff755191a0b480240842fb188c8a3bb7c190
      bytes: 361768711

decode:
  format: csv

targets:
  - schema: oda.job.v0.2.0
    capabilities:
      - { problem_domain: job-runtime-prediction, target_column: runtime_seconds }
    suitable_models: [model.job_runtime_baseline, model.job_runtime_xgboost]
    mapping:
      job_id: { from: primary_job_id, type: integer }
      submit_time: { from: job_submit_time, type: timestamp, format: iso8601 }
      start_time: { from: begin_time, type: timestamp, format: iso8601 }
      end_time: { from: end_time, type: timestamp, format: iso8601 }
      runtime_seconds: { derive: "end_time - start_time" }
      requested_seconds: { from: time_limit, type: duration, unit: seconds }
      num_nodes_alloc: { from: num_nodes, type: integer }
      num_cores_alloc: { from: num_processors, type: integer }
      num_gpus_req: { from: num_gpus, type: integer }
      exit_code: { from: exit_status, type: integer }
      queue: { from: queue }
      job_type: { from: job_type }
      user: { from: hashed_user_id }
      account: { from: hashed_user_group_id }
    filter: { require_nonnull: [runtime_seconds] }
    output: { id: lassen, path: data/datasets/lassen/data.parquet }
