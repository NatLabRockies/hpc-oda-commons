dataset_id: dataset.job_runtime.pwa_hpc2n
schema_version: oda.dataset.v0.1.0
name: PWA HPC2N (Seth cluster)
version: 1.0.0
description: >
  Standard Workload Format log for the HPC2N (High Performance Computing Center North,
  Sweden) Seth cluster, from the Parallel Workloads Archive (527,371 jobs, 2002-2006).
  Runtime target = Run Time (seconds); requested walltime = Requested Time (seconds).
  Absolute UTC submit/start/end are reconstructed from the SWF UnixStartTime header.
problem_domains: [job-runtime-prediction]
systems: [Seth]
providers: [HPC2N]
citation: { url: "https://www.cs.huji.ac.il/labs/parallel/workload/l_hpc2n/" }
license: { spdx: CC-BY-4.0, gated: false }
tags: [pwa, swf, hpc2n, seth]
size:
  default_bytes: 6929457
  full_bytes: 6929457
  rows_hint: "527,371 jobs (2002-2006)"

source:
  kind: http
  resources:
    - filename: HPC2N-2002-2.swf.gz
      url: "https://www.cs.huji.ac.il/labs/parallel/workload/l_hpc2n/HPC2N-2002-2.swf.gz"
      sha256: 8601894594724ccecff9a17f4c4ccdbbdb30765f07f9ff7bf9c3bcf7b0f6a9a9
      bytes: 6929457

decode:
  format: swf

targets:
  - schema: oda.job.v0.2.0
    capabilities:
      - { problem_domain: job-runtime-prediction, target_column: runtime_seconds }
    suitable_models: [model.job_runtime_baseline, model.job_runtime_xgboost]
    mapping:
      job_id: { from: swf_job }
      submit_time: { from: submit_time, type: timestamp, format: epoch_s }
      start_time: { from: start_time, type: timestamp, format: epoch_s }
      end_time: { from: end_time, type: timestamp, format: epoch_s }
      runtime_seconds: { from: run_time, type: duration, unit: seconds }
      requested_seconds: { from: req_time, type: duration, unit: seconds }
      allocated_cpus: { from: procs_alloc, type: integer }
      num_cores_req: { from: req_procs, type: integer }
      job_state: { from: status }
      queue: { from: queue }
      partition: { from: partition }
      user: { from: user, type: hash_identifier }
    filter: { require_nonnull: [runtime_seconds] }
    output: { id: pwa_hpc2n, path: data/datasets/pwa_hpc2n/data.parquet }
