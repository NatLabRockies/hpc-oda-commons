dataset_id: dataset.job_runtime.pwa_kit_fh2
schema_version: oda.dataset.v0.1.0
name: PWA KIT-FH2 (ForHLR II)
version: 1.0.0
description: >
  Standard Workload Format log for the ForHLR II (KIT-FH2) cluster, from the Parallel
  Workloads Archive (114,355 jobs, 2016-2018). Runtime-prediction target = Run Time
  (seconds); requested walltime = Requested Time (seconds). Absolute UTC submit/start/end
  are reconstructed from the SWF UnixStartTime header by the swf decoder.
problem_domains: [job-runtime-prediction]
systems: [ForHLR-II]
providers: [KIT]
citation: { url: "https://www.cs.huji.ac.il/labs/parallel/workload/l_kit_fh2/" }
license: { spdx: CC-BY-4.0, gated: false }
tags: [pwa, swf, kit, forhlr2]
size:
  default_bytes: 1194167
  full_bytes: 1194167
  rows_hint: "114,355 jobs (2016-2018)"

source:
  kind: http
  resources:
    - filename: KIT-FH2-2016-1.swf.gz
      url: "https://www.cs.huji.ac.il/labs/parallel/workload/l_kit_fh2/KIT-FH2-2016-1.swf.gz"
      sha256: e1a4b12185dae1d2666f66649274883f85ae611b553edbc22726a5edec6239f5
      bytes: 1194167

decode:
  format: swf

targets:
  - schema: oda.job.v0.2.0
    capabilities:
      - { problem_domain: job-runtime-prediction, target_column: runtime_seconds }
    suitable_models: [model.job_runtime_baseline, model.job_runtime_xgboost]
    mapping:
      job_id: { from: swf_job }
      submit_time: { from: submit_time, type: timestamp, format: epoch_s }
      start_time: { from: start_time, type: timestamp, format: epoch_s }
      end_time: { from: end_time, type: timestamp, format: epoch_s }
      runtime_seconds: { from: run_time, type: duration, unit: seconds }
      requested_seconds: { from: req_time, type: duration, unit: seconds }
      allocated_cpus: { from: procs_alloc, type: integer }
      num_cores_req: { from: req_procs, type: integer }
      job_state: { from: status }
      queue: { from: queue }
      partition: { from: partition }
      user: { from: user, type: hash_identifier }
    filter: { require_nonnull: [runtime_seconds] }
    output: { id: pwa_kit_fh2, path: data/datasets/pwa_kit_fh2/data.parquet }
