dataset_id: dataset.job_runtime.pwa_ricc
schema_version: oda.dataset.v0.1.0
name: PWA RICC (RIKEN Integrated Cluster)
version: 1.0.0
description: >
  Standard Workload Format log for the RIKEN Integrated Cluster of Clusters (RICC), from the
  Parallel Workloads Archive (447,794 jobs, 2010). Runtime target = Run Time (seconds);
  requested walltime = Requested Time (seconds). Absolute UTC submit/start/end are
  reconstructed from the SWF UnixStartTime header by the swf decoder.
problem_domains: [job-runtime-prediction]
systems: [RICC]
providers: [RIKEN]
citation: { url: "https://www.cs.huji.ac.il/labs/parallel/workload/l_ricc/" }
license: { spdx: CC-BY-4.0, gated: false }
tags: [pwa, swf, riken, ricc]
size:
  default_bytes: 3673454
  full_bytes: 3673454
  rows_hint: "447,794 jobs (2010)"

source:
  kind: http
  resources:
    - filename: RICC-2010-2.swf.gz
      url: "https://www.cs.huji.ac.il/labs/parallel/workload/l_ricc/RICC-2010-2.swf.gz"
      sha256: 38b7c5c9843d9a9f3d61a2d8b927f6d39b68b368fb713886b5f2ce3499f2ec82
      bytes: 3673454

decode:
  format: swf

targets:
  - schema: oda.job.v0.2.0
    capabilities:
      - { problem_domain: job-runtime-prediction, target_column: runtime_seconds }
    suitable_models: [model.job_runtime_baseline, model.job_runtime_xgboost]
    mapping:
      job_id: { from: swf_job }
      submit_time: { from: submit_time, type: timestamp, format: epoch_s }
      start_time: { from: start_time, type: timestamp, format: epoch_s }
      end_time: { from: end_time, type: timestamp, format: epoch_s }
      runtime_seconds: { from: run_time, type: duration, unit: seconds }
      requested_seconds: { from: req_time, type: duration, unit: seconds }
      allocated_cpus: { from: procs_alloc, type: integer }
      num_cores_req: { from: req_procs, type: integer }
      job_state: { from: status }
      queue: { from: queue }
      partition: { from: partition }
      user: { from: user, type: hash_identifier }
    filter: { require_nonnull: [runtime_seconds] }
    output: { id: pwa_ricc, path: data/datasets/pwa_ricc/data.parquet }
