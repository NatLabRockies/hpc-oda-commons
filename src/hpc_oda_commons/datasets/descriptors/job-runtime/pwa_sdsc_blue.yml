dataset_id: dataset.job_runtime.pwa_sdsc_blue
schema_version: oda.dataset.v0.1.0
name: PWA SDSC Blue Horizon
version: 1.0.0
description: >
  Standard Workload Format log for the SDSC Blue Horizon (IBM SP) system, from the Parallel
  Workloads Archive (250,440 jobs, 2000-2002). Runtime target = Run Time (seconds); requested
  walltime = Requested Time (seconds). Absolute UTC submit/start/end are reconstructed from the
  SWF UnixStartTime header by the swf decoder.
problem_domains: [job-runtime-prediction]
systems: [Blue Horizon]
providers: [SDSC]
citation: { url: "https://www.cs.huji.ac.il/labs/parallel/workload/l_sdsc_blue/" }
license: { spdx: CC-BY-4.0, gated: false }
tags: [pwa, swf, sdsc, blue-horizon]
size:
  default_bytes: 4156286
  full_bytes: 4156286
  rows_hint: "250,440 jobs (2000-2002)"

source:
  kind: http
  resources:
    - filename: SDSC-BLUE-2000-4.swf.gz
      url: "https://www.cs.huji.ac.il/labs/parallel/workload/l_sdsc_blue/SDSC-BLUE-2000-4.swf.gz"
      sha256: 25789358cafeb3810f6e18694082198af729e71b527042d75625b05b46957677
      bytes: 4156286

decode:
  format: swf

targets:
  - schema: oda.job.v0.2.0
    capabilities:
      - { problem_domain: job-runtime-prediction, target_column: runtime_seconds }
    suitable_models: [model.job_runtime_baseline, model.job_runtime_xgboost]
    mapping:
      job_id: { from: swf_job }
      submit_time: { from: submit_time, type: timestamp, format: epoch_s }
      start_time: { from: start_time, type: timestamp, format: epoch_s }
      end_time: { from: end_time, type: timestamp, format: epoch_s }
      runtime_seconds: { from: run_time, type: duration, unit: seconds }
      requested_seconds: { from: req_time, type: duration, unit: seconds }
      allocated_cpus: { from: procs_alloc, type: integer }
      num_cores_req: { from: req_procs, type: integer }
      job_state: { from: status }
      queue: { from: queue }
      partition: { from: partition }
      user: { from: user, type: hash_identifier }
    filter: { require_nonnull: [runtime_seconds] }
    output: { id: pwa_sdsc_blue, path: data/datasets/pwa_sdsc_blue/data.parquet }
