# Tiny synthetic benchmark recipe for SLURM job runtime prediction (v0.1).
# Used for CI smoke tests and offline demo runs.

recipe_id: recipe.job_runtime.baseline.2025_Dec
problem_domain:
  - job-runtime-prediction

# Input data schema version required by this recipe.
schema_version: oda.job.v0.1.0

dataset:
  id: hpc_oda_commons/datasets/ingested/jobs_parquet/jobs-parquet-20260601-083301
  table_path: /global/u2/b/boztop/hpc-oda-commons/data/ingested/jobs_parquet/jobs-parquet-20260601-083301/data.parquet
  manifest_path: /global/u2/b/boztop/hpc-oda-commons/data/ingested/jobs_parquet/jobs-parquet-20260601-083301/manifest.json

model:
  id: model.job_runtime_baseline
  version: "0.1.0"

# Runtime prediction is regression: provide at least MAE and RMSE in v0.1.
metrics:
  - name: mae
    target: runtime_seconds
  - name: rmse
    target: runtime_seconds

# v0.1 can use a simple deterministic split.
split:
  method: fixed
  train_fraction: 0.8
  seed: 42

run:
  # Optional knobs: keep minimal in v0.1
  output_dir: runs
  overwrite: false
