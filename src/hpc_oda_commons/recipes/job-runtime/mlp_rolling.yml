# Rolling feed-forward MLP recipe for runtime prediction.
# Uses automatic categorical preprocessing (OHE + SVD) + daily preprocessing refresh.
#
# Place ingested data at:
#   data/ingested/jobs_parquet/fugaku_24_04/data.parquet
#   data/ingested/jobs_parquet/fugaku_24_04/manifest.json
# (relative to the repo root when running `hpc-oda benchmark`)

recipe_id: recipe.job_runtime.mlp_rolling
problem_domain:
  - job-runtime-prediction
schema_version: oda.job.v0.2.0

dataset:
  id: fugaku_24_04
  table_path: data/ingested/jobs_parquet/fugaku_24_04/data.parquet
  manifest_path: data/ingested/jobs_parquet/fugaku_24_04/manifest.json

model:
  id: model.job_runtime_mlp
  version: "0.1.0"

metrics:
  - name: mae
    target: runtime_seconds
  - name: rmse
    target: runtime_seconds
  - name: underprediction_ratio
    target: runtime_seconds

split:
  method: rolling
  n_windows: 20
  test_window_hours: 6
  training_lookback_days: 7

run:
  output_dir: runs
  overwrite: false
