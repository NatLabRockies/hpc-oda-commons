# Rolling XGBoost alternate model recipe for runtime prediction.
# Uses automatic categorical preprocessing analysis + daily preprocessing refresh.

recipe_id: recipe.job_runtime.xgb_hourly_recent
problem_domain:
  - job-runtime-prediction
schema_version: oda.job.v0.1.0

dataset:
  id: hpc_oda_commons/datasets/synthetic/job-runtime/tiny
  table_path: hpc_oda_commons/datasets/synthetic/job-runtime/tiny/data.parquet
  manifest_path: hpc_oda_commons/datasets/synthetic/job-runtime/tiny/manifest.json

model:
  id: model.job_runtime_xgboost
  version: "0.1.0"

metrics:
  - name: mae
    target: runtime_seconds
  - name: rmse
    target: runtime_seconds

split:
  method: rolling
  n_windows: 1000
  test_window_hours: 6
  training_lookback_days: 100

run:
  output_dir: runs
  overwrite: false
